<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% if app.name %}
  <title id="page-title">{{ app.name }} — 앱과사전</title>
  <meta id="meta-desc" name="description" content="{{ app.name }} 앱 정보. {{ app.developer }} 개발. 앱과사전에서 확인하세요. {{ app.description }}" />
  <meta property="og:title" content="{{ app.name }} — 앱과사전" />
  <meta property="og:description" content="{{ app.developer }} 개발. {{ app.description }}" />
  <meta property="og:image" content="{{ app.icon }}" />
  <meta property="og:url" content="https://www.apppedia.co.kr/app/{{ app_id }}" />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://www.apppedia.co.kr/app/{{ app_id }}" />
  {% else %}
  <title id="page-title">앱 상세 정보 — 앱과사전</title>
  <meta id="meta-desc" name="description" content="앱과사전에서 앱 상세 정보를 확인하세요." />
  {% endif %}
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8090455218036534" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f5f7fa; color: #1a1a2e; }
    .header-bar { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid #e8eaf0; }
    .hero-accent { background: linear-gradient(135deg, #00b4d8, #0077b6, #023e8a); }
    .card { background:#fff; border:1px solid #e8eaf0; border-radius:16px; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
    .store-btn-appstore   { background:#000; color:#fff; }
    .store-btn-googleplay { background:#01875f; color:#fff; }
    .star { color:#f59e0b; }
    .screenshot {
      border-radius: 14px;
      object-fit: cover;
      height: 300px;
      width: auto;
      flex-shrink: 0;
      border: 1px solid #e8eaf0;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .screenshot:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .shimmer {
      background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* 라이트박스 */
    #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999; align-items:center; justify-content:center; }
    #lightbox.open { display:flex; }
    #lightbox img { max-height:90vh; max-width:90vw; border-radius:16px; }
    #lightbox-close { position:absolute; top:20px; right:24px; color:#fff; font-size:28px; cursor:pointer; line-height:1; }

    .rating-bar-bg { background:#f1f5f9; border-radius:99px; height:6px; }
    .rating-bar-fill { background:#f59e0b; border-radius:99px; height:6px; transition: width 0.6s ease; }
  </style>
</head>
<body class="min-h-screen font-sans">

  <!-- 라이트박스 -->
  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img" src="" alt="스크린샷" onclick="event.stopPropagation()"/>
  </div>

  <!-- Header -->
  <header class="header-bar sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-xl hero-accent shadow-sm">📱</div>
        <span class="text-lg font-extrabold tracking-tight text-gray-900">앱과사전</span>
      </a>
      <a href="/" class="text-sm text-blue-500 hover:text-blue-700 font-medium">← 순위로 돌아가기</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">

    <!-- 로딩 스켈레톤 -->
    <div id="skeleton">
      <div class="card p-6 mb-4 flex gap-5">
        <div class="shimmer w-24 h-24 rounded-2xl shrink-0"></div>
        <div class="flex-1 space-y-3 pt-2">
          <div class="shimmer h-5 w-48"></div>
          <div class="shimmer h-3 w-32"></div>
          <div class="shimmer h-8 w-36 rounded-xl"></div>
        </div>
      </div>
      <div class="card p-6 mb-4 space-y-2">
        <div class="shimmer h-3 w-full"></div>
        <div class="shimmer h-3 w-full"></div>
        <div class="shimmer h-3 w-3/4"></div>
      </div>
    </div>

    <!-- 앱 정보 -->
    <div id="content" class="hidden">

      <!-- 앱 헤더 -->
      <div class="card p-6 mb-4">
        <div class="flex gap-5 items-start mb-5">
          <img id="app-icon" src="" alt=""
            class="w-24 h-24 rounded-2xl shrink-0 object-cover bg-gray-100 shadow-md" />
          <div class="flex-1 min-w-0">
            <h1 id="app-name" class="text-xl font-extrabold text-gray-900 mb-1 leading-tight"></h1>
            <p id="app-developer" class="text-sm text-gray-400 mb-3"></p>
            <div class="flex items-center gap-1.5 mb-3">
              <span id="stars" class="star text-base"></span>
              <span id="app-rating" class="text-sm font-bold text-gray-700"></span>
              <span id="app-rating-count" class="text-xs text-gray-400"></span>
            </div>
            <div class="flex items-center gap-2 flex-wrap mb-4">
              <span id="app-category" class="text-xs px-2.5 py-1 rounded-full bg-blue-50 text-blue-600 font-semibold"></span>
              <span id="app-price" class="text-xs px-2.5 py-1 rounded-full bg-green-50 text-green-600 font-semibold"></span>
              <span id="app-store-badge" class="text-xs px-2.5 py-1 rounded-full font-semibold"></span>
            </div>
            <div class="flex gap-2 flex-wrap">
              <a id="app-store-btn" href="#" target="_blank"
                class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold transition-all hover:opacity-90 shadow-sm">
                <span id="store-icon"></span>
                <span id="store-label"></span>
              </a>
              <button onclick="shareApp()"
                class="inline-flex items-center gap-1.5 px-4 py-2.5 rounded-xl text-sm font-semibold bg-gray-100 hover:bg-gray-200 text-gray-600 transition-all">
                🔗 공유
              </button>
            </div>
          </div>
        </div>

        <!-- 앱 정보 3단 -->
        <div class="grid grid-cols-3 gap-3 pt-5 border-t border-gray-100 text-center">
          <div class="bg-gray-50 rounded-2xl py-3">
            <div class="text-xs text-gray-400 mb-1">버전</div>
            <div id="app-version" class="text-sm font-bold text-gray-700"></div>
          </div>
          <div class="bg-gray-50 rounded-2xl py-3">
            <div class="text-xs text-gray-400 mb-1">업데이트</div>
            <div id="app-updated" class="text-sm font-bold text-gray-700"></div>
          </div>
          <div class="bg-gray-50 rounded-2xl py-3">
            <div class="text-xs text-gray-400 mb-1">카테고리</div>
            <div id="app-category2" class="text-sm font-bold text-gray-700 truncate px-1"></div>
          </div>
        </div>
      </div>

      <!-- 스크린샷 -->
      <div class="card p-5 mb-4" id="screenshot-section">
        <h2 class="text-sm font-bold text-gray-700 mb-3">📸 스크린샷</h2>
        <div id="screenshots" class="flex gap-3 overflow-x-auto pb-2" style="scrollbar-width:thin"></div>
      </div>

      <!-- 앱 설명 -->
      <div class="card p-5 mb-4">
        <h2 class="text-sm font-bold text-gray-700 mb-3">📄 앱 설명</h2>
        <div id="app-description" class="text-sm text-gray-600 leading-relaxed whitespace-pre-line line-clamp-6"></div>
        <button id="desc-toggle" class="mt-3 text-xs text-blue-500 hover:text-blue-700 font-semibold hidden">
          더 보기 ▼
        </button>
      </div>

      <!-- 하단 다운로드 버튼 -->
      <a id="app-store-btn2" href="#" target="_blank"
        class="flex items-center justify-center gap-2 w-full py-4 rounded-2xl text-white font-bold text-base shadow-md transition-all hover:opacity-90 mb-4">
        <span id="store-icon2"></span>
        <span id="store-label2"></span> 에서 다운로드
      </a>

      <!-- 공유 토스트 -->
      <div id="share-toast"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-5 py-3 rounded-2xl shadow-lg hidden z-50 transition-all">
        🔗 링크가 복사됐어요!
      </div>

      <!-- 리뷰 섹션 -->
      <div class="card p-5 mb-4">
        <h2 class="text-sm font-bold text-gray-700 mb-4">💬 사용자 리뷰</h2>

        <!-- 리뷰 작성 -->
        <div class="bg-gray-50 rounded-2xl p-4 mb-5">
          <p class="text-xs font-semibold text-gray-600 mb-3">리뷰 작성</p>
          <input id="review-nickname" type="text" placeholder="닉네임 (최대 20자)"
            class="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-400 mb-2" maxlength="20"/>
          <div class="flex gap-1 mb-2" id="star-input">
            <button onclick="setStar(1)" data-star="1" class="text-2xl text-gray-300 hover:text-yellow-400 transition-colors">★</button>
            <button onclick="setStar(2)" data-star="2" class="text-2xl text-gray-300 hover:text-yellow-400 transition-colors">★</button>
            <button onclick="setStar(3)" data-star="3" class="text-2xl text-gray-300 hover:text-yellow-400 transition-colors">★</button>
            <button onclick="setStar(4)" data-star="4" class="text-2xl text-gray-300 hover:text-yellow-400 transition-colors">★</button>
            <button onclick="setStar(5)" data-star="5" class="text-2xl text-gray-300 hover:text-yellow-400 transition-colors">★</button>
          </div>
          <textarea id="review-comment" placeholder="앱 사용 후기를 남겨주세요 (최대 200자)"
            class="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm outline-none focus:border-blue-400 resize-none h-20 mb-2" maxlength="200"></textarea>
          <button onclick="submitReview()"
            class="w-full py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm transition-all">
            리뷰 등록
          </button>
          <p id="review-msg" class="text-xs text-center mt-2 hidden"></p>
        </div>

        <!-- 리뷰 목록 -->
        <div id="review-list" class="space-y-3">
          <p class="text-sm text-gray-400 text-center py-4">리뷰를 불러오는 중...</p>
        </div>
      </div>
    </div>

    <!-- 에러 -->
    <div id="error-msg" class="hidden text-center py-20 text-gray-400">
      앱 정보를 불러오지 못했어요 😢<br/>
      <a href="/" class="text-blue-500 text-sm mt-2 inline-block">← 홈으로</a>
    </div>
  </main>

  <script>
    const appId = "{{ app_id }}";

    function escHtml(s) {
      return String(s||'').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    async function shareApp() {
      const url = location.href;
      try {
        if (navigator.share) {
          await navigator.share({ title: document.title, url });
        } else {
          await navigator.clipboard.writeText(url);
          const toast = document.getElementById('share-toast');
          toast.classList.remove('hidden');
          setTimeout(() => toast.classList.add('hidden'), 2000);
        }
      } catch(e) {}
    }

    async function loadApp() {
      try {
        const res = await fetch(`/api/app/${appId}`);
        if (!res.ok) throw new Error();
        const d = await res.json();

        document.getElementById('page-title').textContent = `${d.name} — 앱과사전`;
        document.getElementById('meta-desc').content =
          `${d.name} 앱 정보. ${d.developer} 개발. 별점 ${d.rating}. 앱과사전에서 확인하세요.`;

        document.getElementById('app-icon').src   = d.icon;
        document.getElementById('app-icon').alt   = d.name;
        document.getElementById('app-name').textContent      = d.name;
        document.getElementById('app-developer').textContent = d.developer;
        document.getElementById('app-category').textContent  = d.category;
        document.getElementById('app-category2').textContent = d.category;
        document.getElementById('app-price').textContent     = d.price || '무료';
        document.getElementById('app-version').textContent   = d.version || '-';
        document.getElementById('app-updated').textContent   = d.updated || '-';

        // 스토어 배지
        const isAppStore = d.store === 'appstore';
        const storeBadge = document.getElementById('app-store-badge');
        storeBadge.textContent = isAppStore ? 'App Store' : 'Google Play';
        storeBadge.classList.add(isAppStore ? 'bg-blue-900' : 'bg-green-900', 'text-white');

        // 별점
        const rating = d.rating || 0;
        document.getElementById('app-rating').textContent = rating.toFixed(1);
        document.getElementById('app-rating-count').textContent =
          d.rating_count ? `(${d.rating_count.toLocaleString()}개)` : '';
        const stars = Math.round(rating);
        document.getElementById('stars').textContent = '★'.repeat(stars) + '☆'.repeat(5 - stars);

        // 스토어 버튼
        const btnClass   = isAppStore ? 'store-btn-appstore' : 'store-btn-googleplay';
        const storeLabel = isAppStore ? 'App Store에서 받기' : 'Google Play에서 받기';
        const storeIcon  = isAppStore ? '🍎' : '🤖';
        ['app-store-btn','app-store-btn2'].forEach(id => {
          const el = document.getElementById(id);
          el.href = d.url;
          el.classList.add(btnClass);
        });
        document.getElementById('store-icon').textContent  = storeIcon;
        document.getElementById('store-icon2').textContent = storeIcon;
        document.getElementById('store-label').textContent = storeLabel;
        document.getElementById('store-label2').textContent = isAppStore ? 'App Store' : 'Google Play';

        // 스크린샷
        if (d.screenshots && d.screenshots.length) {
          document.getElementById('screenshots').innerHTML =
            d.screenshots.map(s =>
              `<img src="${escHtml(s)}" class="screenshot" alt="스크린샷"
                onclick="openLightbox('${escHtml(s)}')"
                onerror="this.style.display='none'"/>`
            ).join('');
        } else {
          document.getElementById('screenshot-section').style.display = 'none';
        }

        // 설명
        const desc = d.description || '설명이 없어요.';
        const descEl = document.getElementById('app-description');
        descEl.textContent = desc;
        if (desc.length > 300) {
          descEl.classList.add('line-clamp-6');
          const toggle = document.getElementById('desc-toggle');
          toggle.classList.remove('hidden');
          let expanded = false;
          toggle.addEventListener('click', () => {
            expanded = !expanded;
            descEl.classList.toggle('line-clamp-6', !expanded);
            toggle.textContent = expanded ? '접기 ▲' : '더 보기 ▼';
          });
        }

        document.getElementById('skeleton').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
      } catch(e) {
        document.getElementById('skeleton').classList.add('hidden');
        document.getElementById('error-msg').classList.remove('hidden');
      }
    }

    loadApp();

    // ── 리뷰 ─────────────────────────────────────────
    let selectedStar = 0;

    function setStar(n) {
      selectedStar = n;
      document.querySelectorAll('#star-input button').forEach(btn => {
        btn.classList.toggle('text-yellow-400', parseInt(btn.dataset.star) <= n);
        btn.classList.toggle('text-gray-300',   parseInt(btn.dataset.star) > n);
      });
    }

    async function loadReviews() {
      const el = document.getElementById('review-list');
      try {
        const res  = await fetch(`/api/reviews/${appId}`);
        const list = await res.json();
        if (!list.length) {
          el.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">아직 리뷰가 없어요. 첫 리뷰를 남겨보세요!</p>';
          return;
        }
        el.innerHTML = list.map(r => `
          <div class="border border-gray-100 rounded-2xl p-4">
            <div class="flex items-center justify-between mb-1">
              <span class="font-semibold text-sm text-gray-800">${escHtml(r.nickname)}</span>
              <span class="text-xs text-gray-400">${r.created_at}</span>
            </div>
            <div class="text-yellow-400 text-sm mb-2">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
            <p class="text-sm text-gray-600 leading-relaxed">${escHtml(r.comment)}</p>
          </div>`).join('');
      } catch(e) {
        el.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">리뷰를 불러오지 못했어요</p>';
      }
    }

    async function submitReview() {
      const nickname = document.getElementById('review-nickname').value.trim();
      const comment  = document.getElementById('review-comment').value.trim();
      if (!nickname) { showMsg('닉네임을 입력해주세요', 'red'); return; }
      if (!selectedStar) { showMsg('별점을 선택해주세요', 'red'); return; }
      if (!comment) { showMsg('리뷰 내용을 입력해주세요', 'red'); return; }
      try {
        const res = await fetch(`/api/reviews/${appId}`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({nickname, rating: selectedStar, comment})
        });
        const data = await res.json();
        if (data.ok) {
          document.getElementById('review-nickname').value = '';
          document.getElementById('review-comment').value = '';
          setStar(0); selectedStar = 0;
          showMsg('리뷰가 등록됐어요!', 'green');
          loadReviews();
        } else {
          showMsg(data.error || '오류가 발생했어요', 'red');
        }
      } catch(e) { showMsg('오류가 발생했어요', 'red'); }
    }

    function showMsg(text, color) {
      const msg = document.getElementById('review-msg');
      msg.textContent = text;
      msg.className = `text-xs text-center mt-2 text-${color}-500`;
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 3000);
    }

    loadReviews();
  </script>
</body>
</html>
