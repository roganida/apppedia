<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% if app.name %}
  <title id="page-title">{{ app.name }} — 앱과사전</title>
  <meta id="meta-desc" name="description" content="{{ app.name }} 앱 정보. {{ app.developer }} 개발. 앱과사전에서 확인하세요. {{ app.description }}" />
  <meta property="og:title" content="{{ app.name }} — 앱과사전" />
  <meta property="og:description" content="{{ app.developer }} 개발. {{ app.description }}" />
  <meta property="og:image" content="{{ app.icon }}" />
  <meta property="og:url" content="https://www.apppedia.co.kr/app/{{ app_id }}" />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://www.apppedia.co.kr/app/{{ app_id }}" />
  {% else %}
  <title id="page-title">앱 상세 정보 — 앱과사전</title>
  <meta id="meta-desc" name="description" content="앱과사전에서 앱 상세 정보를 확인하세요." />
  {% endif %}
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f5f7fa; color: #1a1a2e; }
    .header-bar {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid #e8eaf0;
    }
    .hero-accent { background: linear-gradient(135deg, #00b4d8, #0077b6, #023e8a); }
    .card {
      background: #fff;
      border: 1px solid #e8eaf0;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .store-btn-appstore   { background: #000; color: #fff; }
    .store-btn-googleplay { background: #01875f; color: #fff; }
    .star { color: #f59e0b; }
    .screenshot {
      border-radius: 12px;
      object-fit: cover;
      height: 200px;
      flex-shrink: 0;
      border: 1px solid #e8eaf0;
    }
    .shimmer {
      background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
      background-size:200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body class="min-h-screen font-sans">

  <!-- Header -->
  <header class="header-bar sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-xl hero-accent shadow-sm">📱</div>
        <span class="text-lg font-extrabold tracking-tight text-gray-900">앱과사전</span>
      </a>
      <a href="/" class="text-sm text-blue-500 hover:text-blue-700 font-medium">← 순위로 돌아가기</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">

    <!-- 로딩 스켈레톤 -->
    <div id="skeleton">
      <div class="card p-6 mb-4 flex gap-5">
        <div class="shimmer w-24 h-24 rounded-2xl shrink-0"></div>
        <div class="flex-1 space-y-3 pt-2">
          <div class="shimmer h-5 w-48"></div>
          <div class="shimmer h-3 w-32"></div>
          <div class="shimmer h-3 w-24"></div>
        </div>
      </div>
      <div class="card p-6 mb-4 space-y-2">
        <div class="shimmer h-3 w-full"></div>
        <div class="shimmer h-3 w-full"></div>
        <div class="shimmer h-3 w-3/4"></div>
      </div>
    </div>

    <!-- 앱 정보 (로드 후 표시) -->
    <div id="content" class="hidden">

      <!-- 앱 헤더 카드 -->
      <div class="card p-6 mb-4">
        <div class="flex gap-5 items-start">
          <img id="app-icon" src="" alt=""
            class="w-24 h-24 rounded-2xl shrink-0 object-cover bg-gray-100 shadow-sm" />
          <div class="flex-1 min-w-0">
            <h1 id="app-name" class="text-xl font-extrabold text-gray-900 mb-1"></h1>
            <p id="app-developer" class="text-sm text-gray-500 mb-2"></p>
            <div class="flex items-center gap-3 flex-wrap mb-3">
              <div class="flex items-center gap-1">
                <span class="star text-lg" id="stars"></span>
                <span id="app-rating" class="text-sm font-bold text-gray-700"></span>
                <span id="app-rating-count" class="text-xs text-gray-400"></span>
              </div>
              <span id="app-category"
                class="text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-600 font-medium"></span>
              <span id="app-price"
                class="text-xs px-2 py-1 rounded-full bg-green-50 text-green-600 font-medium"></span>
            </div>
            <a id="app-store-btn" href="#" target="_blank"
              class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold transition-all hover:opacity-90 shadow-sm">
              <span id="store-icon"></span>
              <span id="store-label"></span>
            </a>
          </div>
        </div>

        <!-- 버전/업데이트 -->
        <div class="flex gap-6 mt-5 pt-5 border-t border-gray-100 text-center">
          <div class="flex-1">
            <div class="text-xs text-gray-400 mb-1">버전</div>
            <div id="app-version" class="text-sm font-semibold text-gray-700"></div>
          </div>
          <div class="flex-1">
            <div class="text-xs text-gray-400 mb-1">업데이트</div>
            <div id="app-updated" class="text-sm font-semibold text-gray-700"></div>
          </div>
          <div class="flex-1">
            <div class="text-xs text-gray-400 mb-1">카테고리</div>
            <div id="app-category2" class="text-sm font-semibold text-gray-700"></div>
          </div>
        </div>
      </div>

      <!-- 스크린샷 -->
      <div class="card p-5 mb-4" id="screenshot-section">
        <h2 class="text-sm font-bold text-gray-700 mb-3">📸 스크린샷</h2>
        <div id="screenshots" class="flex gap-3 overflow-x-auto pb-2"></div>
      </div>

      <!-- 앱 설명 -->
      <div class="card p-5 mb-4">
        <h2 class="text-sm font-bold text-gray-700 mb-3">📄 앱 설명</h2>
        <div id="app-description"
          class="text-sm text-gray-600 leading-relaxed whitespace-pre-line line-clamp-6"></div>
        <button id="desc-toggle"
          class="mt-2 text-xs text-blue-500 hover:text-blue-700 font-medium hidden">
          더 보기 ▼
        </button>
      </div>

      <!-- 하단 다운로드 버튼 -->
      <a id="app-store-btn2" href="#" target="_blank"
        class="block w-full text-center py-4 rounded-2xl text-white font-bold text-base shadow-md transition-all hover:opacity-90 mb-8">
        <span id="store-label2"></span> 에서 다운로드
      </a>
    </div>

    <!-- 에러 -->
    <div id="error-msg" class="hidden text-center py-20 text-gray-400">
      앱 정보를 불러오지 못했어요 😢<br/>
      <a href="/" class="text-blue-500 text-sm mt-2 inline-block">← 홈으로</a>
    </div>
  </main>

  <script>
    const appId = "{{ app_id }}";

    async function loadApp() {
      try {
        const res = await fetch(`/api/app/${appId}`);
        if (!res.ok) throw new Error();
        const d = await res.json();

        // 메타 태그 업데이트
        document.getElementById('page-title').textContent = `${d.name} — 앱과사전`;
        document.getElementById('meta-desc').content =
          `${d.name} 앱 정보. ${d.developer} 개발. 별점 ${d.rating}. 앱과사전에서 확인하세요.`;

        document.getElementById('app-icon').src = d.icon;
        document.getElementById('app-icon').alt = d.name;
        document.getElementById('app-name').textContent = d.name;
        document.getElementById('app-developer').textContent = d.developer;
        document.getElementById('app-category').textContent = d.category;
        document.getElementById('app-category2').textContent = d.category;
        document.getElementById('app-price').textContent = d.price || '무료';
        document.getElementById('app-version').textContent = d.version || '-';
        document.getElementById('app-updated').textContent = d.updated || '-';

        // 별점
        const rating = d.rating || 0;
        document.getElementById('app-rating').textContent = rating.toFixed(1);
        document.getElementById('app-rating-count').textContent =
          d.rating_count ? `(${d.rating_count.toLocaleString()}개)` : '';
        const stars = Math.round(rating);
        document.getElementById('stars').textContent = '★'.repeat(stars) + '☆'.repeat(5 - stars);

        // 스토어 버튼
        const isAppStore = d.store === 'appstore';
        const btnClass = isAppStore ? 'store-btn-appstore' : 'store-btn-googleplay';
        const storeLabel = isAppStore ? 'App Store에서 받기' : 'Google Play에서 받기';
        const storeIcon = isAppStore ? '🍎' : '🤖';
        ['app-store-btn','app-store-btn2'].forEach(id => {
          const el = document.getElementById(id);
          el.href = d.url;
          el.className = el.className + ' ' + btnClass;
        });
        document.getElementById('store-icon').textContent = storeIcon;
        document.getElementById('store-label').textContent = storeLabel;
        document.getElementById('store-label2').textContent = isAppStore ? 'App Store' : 'Google Play';

        // 스크린샷
        if (d.screenshots && d.screenshots.length) {
          document.getElementById('screenshots').innerHTML =
            d.screenshots.map(s =>
              `<img src="${s}" class="screenshot" alt="스크린샷"
                onerror="this.style.display='none'"/>`
            ).join('');
        } else {
          document.getElementById('screenshot-section').style.display = 'none';
        }

        // 설명
        const desc = d.description || '설명이 없어요.';
        const descEl = document.getElementById('app-description');
        descEl.textContent = desc;
        if (desc.length > 300) {
          descEl.classList.add('line-clamp-6');
          const toggle = document.getElementById('desc-toggle');
          toggle.classList.remove('hidden');
          let expanded = false;
          toggle.addEventListener('click', () => {
            expanded = !expanded;
            descEl.classList.toggle('line-clamp-6', !expanded);
            toggle.textContent = expanded ? '접기 ▲' : '더 보기 ▼';
          });
        }

        document.getElementById('skeleton').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
      } catch(e) {
        document.getElementById('skeleton').classList.add('hidden');
        document.getElementById('error-msg').classList.remove('hidden');
      }
    }

    loadApp();
  </script>
</body>
</html>
