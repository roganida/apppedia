  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f5f7fa; color: #1a1a2e; }

    /* Header */
    .header-bar {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid #e8eaf0;
    }

    /* Hero gradient bar */
    .hero-accent {
      background: linear-gradient(135deg, #00b4d8, #0077b6, #023e8a);
    }

    /* Cards */
    .app-card {
      background: #ffffff;
      border: 1px solid #e8eaf0;
      border-radius: 16px;
      transition: all .18s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .app-card:hover {
      box-shadow: 0 6px 24px rgba(0,119,182,0.1);
      border-color: #90e0ef;
      transform: translateY(-1px);
    }

    /* Tabs container */
    .tab-wrap {
      background: #ffffff;
      border: 1px solid #e8eaf0;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .tab-active {
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      color: #fff;
      box-shadow: 0 2px 12px rgba(0,119,182,0.3);
    }
    .tab-inactive { color: #6b7280; }
    .tab-inactive:hover { background: #f0f7ff; color: #0077b6; }

    /* Rank badges */
    .rank-badge {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 12px; font-weight: 800;
    }
    .rank-1 { background: linear-gradient(135deg,#f59e0b,#fbbf24); color:#fff; }
    .rank-2 { background: linear-gradient(135deg,#94a3b8,#cbd5e1); color:#fff; }
    .rank-3 { background: linear-gradient(135deg,#d97706,#f59e0b); color:#fff; }
    .rank-n  { background: #f1f5f9; color: #94a3b8; }

    .store-badge-appstore   { background: #0077b6; color:#fff; }
    .store-badge-googleplay { background: #01875f; color:#fff; }

    /* Vote button */
    .vote-btn { transition: all .15s; }
    .vote-btn:hover { transform: scale(1.1); }
    .vote-btn.voted { color: #0077b6; }
    .vote-count { color: #0077b6; }

    /* Pulse dot */
    .pulse-dot {
      width:8px; height:8px; border-radius:50%;
      background:#00b4d8; box-shadow:0 0 6px #00b4d8;
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:.5; transform:scale(1.4); }
    }

    /* Shimmer */
    .shimmer {
      background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
      background-size:200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Filter selects */
    .filter-select {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #374151;
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }
    .filter-select:focus { border-color: #00b4d8; }

    ::-webkit-scrollbar{ width:4px; }
    ::-webkit-scrollbar-track{ background:#f1f5f9; }
    ::-webkit-scrollbar-thumb{ background:#cbd5e1; border-radius:2px; }

</head>
<body class="min-h-screen font-sans">

  <!-- Header -->
  <header class="header-bar sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-xl hero-accent shadow-sm">📱</div>
        <div>
          <span class="text-lg font-extrabold tracking-tight text-gray-900">앱과사전</span>
          <span class="text-xs text-gray-400 hidden sm:inline ml-2">실시간 앱 순위</span>
        </div>
      </div>
      <div class="flex items-center gap-2 text-xs text-gray-400">
        <div class="pulse-dot"></div>
        <span>실시간 업데이트</span>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <div class="hero-accent">
    <div class="max-w-5xl mx-auto px-4 py-12 text-center">
      <h1 class="text-5xl sm:text-6xl font-extrabold text-white mb-3 tracking-tight drop-shadow-sm">
        앱과사전
      </h1>
      <p class="text-blue-100 text-sm sm:text-base">
        App Store · Google Play 실시간 차트 + 사용자 투표 + 에디터 픽
      </p>
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-4 py-8">

    <!-- Tabs -->
    <div class="tab-wrap p-1.5 grid grid-cols-3 sm:grid-cols-6 gap-1 mb-6 text-sm font-semibold">
      <button onclick="switchTab('downloads')" id="tab-downloads"
        class="tab-active py-2.5 px-2 rounded-xl flex items-center justify-center gap-1.5 transition-all">
        <span>📥</span><span class="text-xs sm:text-sm">다운로드</span>
      </button>
      <button onclick="switchTab('revenue')" id="tab-revenue"
        class="tab-inactive py-2.5 px-2 rounded-xl flex items-center justify-center gap-1.5 transition-all">
        <span>💰</span><span class="text-xs sm:text-sm">매출 순위</span>
      </button>
      <button onclick="switchTab('new')" id="tab-new"
        class="tab-inactive py-2.5 px-2 rounded-xl flex items-center justify-center gap-1.5 transition-all">
        <span>🆕</span><span class="text-xs sm:text-sm">신규 앱</span>
      </button>
      <button onclick="switchTab('googleplay')" id="tab-googleplay"
        class="tab-inactive py-2.5 px-2 rounded-xl flex items-center justify-center gap-1.5 transition-all">
        <span>🤖</span><span class="text-xs sm:text-sm">Google Play</span>
      </button>
      <button onclick="switchTab('votes')" id="tab-votes"
        class="tab-inactive py-2.5 px-2 rounded-xl flex items-center justify-center gap-1.5 transition-all">
        <span>👍</span><span class="text-xs sm:text-sm">투표 순위</span>
      </button>
      <button onclick="switchTab('curated')" id="tab-curated"
        class="tab-inactive py-2.5 px-2 rounded-xl flex items-center justify-center gap-1.5 transition-all">
        <span>⭐</span><span class="text-xs sm:text-sm">에디터 픽</span>
      </button>
    </div>

    <!-- Filter bar -->
    <div class="flex items-center justify-between mb-4">
      <div id="tab-label" class="text-sm font-medium text-gray-500"></div>
      <div class="flex items-center gap-2">
        <select id="store-filter" onchange="applyFilter()" class="filter-select">
          <option value="all">전체 스토어</option>
          <option value="appstore">App Store</option>
          <option value="googleplay">Google Play</option>
        </select>
        <select id="category-filter" onchange="applyFilter()" class="filter-select">
          <option value="all">전체 카테고리</option>
        </select>
      </div>
    </div>

    <!-- List -->
    <div id="app-list" class="space-y-2"></div>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-10">
      App Store 공식 RSS · Google Play 데이터 기반 · 매 시간 자동 갱신
    </p>
  </main>

  <script>
    let currentTab = 'downloads';
    let allApps = [];
    let votedSet = new Set(JSON.parse(localStorage.getItem('voted') || '[]'));

    const tabLabels = {
      downloads:  '📥 App Store 다운로드 Top 50',
      revenue:    '💰 App Store 매출 Top 50',
      new:        '🆕 App Store 신규 앱 Top 50',
      googleplay: '🤖 Google Play 인기 앱',
      votes:      '👍 사용자 투표 Top 50',
      curated:    '⭐ 에디터 픽',
    };

    function switchTab(tab) {
      currentTab = tab;
      ['downloads','revenue','new','googleplay','votes','curated'].forEach(t => {
        const el = document.getElementById('tab-' + t);
        el.className = el.className.replace(/tab-active|tab-inactive/g, '').trim();
        el.classList.add(t === tab ? 'tab-active' : 'tab-inactive');
      });
      const hideFilter = tab === 'curated' || tab === 'googleplay';
      document.getElementById('store-filter').style.display = hideFilter ? 'none' : '';
      document.getElementById('category-filter').style.display = hideFilter ? 'none' : '';
      loadApps();
    }

    async function loadApps() {
      document.getElementById('tab-label').textContent = tabLabels[currentTab];
      showSkeleton();
      try {
        const res = await fetch(`/api/rankings?tab=${currentTab}`);
        allApps = await res.json();
        populateCategories();
        applyFilter();
      } catch(e) {
        document.getElementById('app-list').innerHTML =
          `<div class="text-center text-gray-400 py-16">데이터를 불러오지 못했어요 😢</div>`;
      }
    }

    function populateCategories() {
      const sel = document.getElementById('category-filter');
      const current = sel.value;
      const cats = [...new Set(allApps.map(a => a.category).filter(Boolean))].sort();
      sel.innerHTML = `<option value="all">전체 카테고리</option>` +
        cats.map(c => `<option value="${c}">${c}</option>`).join('');
      if (cats.includes(current)) sel.value = current;
    }

    function applyFilter() {
      const store = document.getElementById('store-filter').value;
      const cat   = document.getElementById('category-filter').value;
      let apps = allApps;
      if (store !== 'all') apps = apps.filter(a => a.store === store);
      if (cat   !== 'all') apps = apps.filter(a => a.category === cat);
      renderList(apps);
    }

    function renderList(apps) {
      const el = document.getElementById('app-list');
      if (currentTab === 'curated') {
        renderCurated(apps);
        return;
      }
      if (!apps.length) {
        el.innerHTML = `<div class="text-center text-gray-400 py-16">앱이 없어요 🫙</div>`;
        return;
      }
      el.innerHTML = apps.map((app, i) => appCard(app, i + 1)).join('');
    }

    function renderCurated(collections) {
      const el = document.getElementById('app-list');
      if (!collections.length) {
        el.innerHTML = `<div class="text-center text-gray-400 py-16">에디터 픽이 없어요 🫙</div>`;
        return;
      }
      el.innerHTML = collections.map(col => {
        if (!col.apps.length) return '';
        const appCards = col.apps.map(app => `
          <a href="${app.url}" target="_blank"
            class="flex flex-col items-center gap-2 group w-20 shrink-0">
            <img src="${app.icon}" alt="${escHtml(app.name)}"
              class="w-16 h-16 rounded-2xl object-cover bg-gray-100 shadow-sm group-hover:shadow-md transition-all group-hover:-translate-y-0.5"
              onerror="this.src='https://placehold.co/64x64/e2e8f0/94a3b8?text=App'"/>
            <span class="text-xs text-gray-600 text-center leading-tight line-clamp-2 w-full">${escHtml(app.name)}</span>
          </a>
        `).join('');
        return `
          <div class="app-card p-5 mb-4">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-2xl">${col.emoji}</span>
              <div>
                <div class="font-bold text-gray-900 text-base">${escHtml(col.title)}</div>
                <div class="text-xs text-gray-400">${escHtml(col.desc)}</div>
              </div>
            </div>
            <div class="flex gap-4 overflow-x-auto pb-2" style="scrollbar-width:thin">
              ${appCards}
            </div>
          </div>`;
      }).join('');
    }

    function appCard(app, i) {
      const rankClass = i === 1 ? 'rank-1' : i === 2 ? 'rank-2' : i === 3 ? 'rank-3' : 'rank-n';
      const storeBadge = app.store === 'appstore'
        ? `<span class="store-badge-appstore text-[10px] px-1.5 py-0.5 rounded-md font-semibold">App Store</span>`
        : `<span class="store-badge-googleplay text-[10px] px-1.5 py-0.5 rounded-md font-semibold">Google Play</span>`;
      const changeBadge = app.change === 'new'
        ? `<span class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-purple-100 text-purple-600">NEW</span>`
        : app.change && app.change.startsWith('+')
        ? `<span class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-green-100 text-green-600">▲${app.change.slice(1)}</span>`
        : app.change && app.change.startsWith('-')
        ? `<span class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-red-100 text-red-500">▼${app.change.slice(1)}</span>`
        : `<span class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-gray-100 text-gray-400">-</span>`;
      const voted = votedSet.has(app.app_id);
      const voteColor = voted ? 'text-blue-500' : 'text-gray-300 hover:text-blue-400';

      return `
        <div class="app-card px-4 py-3 flex items-center gap-4">
          <div class="rank-badge ${rankClass} shrink-0">${i}</div>
          <a href="/app/${escHtml(app.app_id)}" class="flex items-center gap-4 flex-1 min-w-0">
          <img src="${app.icon}" alt="${escHtml(app.name)}"
            class="w-12 h-12 rounded-2xl shrink-0 object-cover bg-gray-100"
            onerror="this.src='https://placehold.co/48x48/e2e8f0/94a3b8?text=App'"/>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold text-sm text-gray-900 truncate hover:text-blue-600 transition-colors">${escHtml(app.name)}</span>
              ${storeBadge}
              ${changeBadge}
            </div>
            <div class="text-xs text-gray-400 truncate mt-0.5">${escHtml(app.developer || '')} · ${escHtml(app.category || '')}</div>
          </div>
          </a>
          <div class="flex items-center gap-3 shrink-0">
            <div class="text-center hidden sm:block">
              <div class="text-xs font-bold vote-count">${app.votes || 0}</div>
              <div class="text-[10px] text-gray-400">votes</div>
            </div>
            <button onclick="vote('${escHtml(app.app_id)}', this)"
              class="vote-btn ${voteColor} flex flex-col items-center gap-0.5 text-[10px] ${voted ? 'voted' : ''}">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="${voted ? 'currentColor' : 'none'}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21H5a2 2 0 01-2-2v-7a2 2 0 012-2h2.924L11 3.382A1 1 0 0112 3h.023a1 1 0 01.977 1.006V10z"/>
              </svg>
              <span>${voted ? '추천됨' : '추천'}</span>
            </button>
            <a href="${app.url}" target="_blank"
              class="text-xs text-gray-400 hover:text-blue-500 transition-colors px-2 py-1 rounded-lg hover:bg-blue-50">
              →
            </a>
          </div>
        </div>`;
    }

    async function vote(appId, btn) {
      if (votedSet.has(appId)) return;
      try {
        const res = await fetch('/api/vote', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({app_id: appId})
        });
        const data = await res.json();
        votedSet.add(appId);
        localStorage.setItem('voted', JSON.stringify([...votedSet]));
        const card = btn.closest('.app-card');
        const countEl = card.querySelector('.vote-count');
        if (countEl) countEl.textContent = data.vote_count;
        btn.classList.add('voted');
        btn.querySelector('span').textContent = '추천됨';
        btn.querySelector('svg').setAttribute('fill','currentColor');
      } catch(e) { console.error(e); }
    }

    function showSkeleton() {
      document.getElementById('app-list').innerHTML =
        Array.from({length:8}).map(() => `
          <div class="app-card px-4 py-3 flex items-center gap-4">
            <div class="shimmer w-7 h-7 rounded-lg shrink-0"></div>
            <div class="shimmer w-12 h-12 rounded-2xl shrink-0"></div>
            <div class="flex-1 space-y-2">
              <div class="shimmer h-3 w-40 rounded"></div>
              <div class="shimmer h-2.5 w-24 rounded"></div>
            </div>
          </div>`).join('');
    }

    function escHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    loadApps();
    setInterval(loadApps, 60000);
  </script>
</body>
</html>
