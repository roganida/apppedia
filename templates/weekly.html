<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이번 주 인기앱 — 앱과사전</title>
  <meta name="description" content="앱과사전 사용자들이 이번 주 가장 많이 추천한 인기 앱 TOP 10을 확인하세요." />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f5f7fa; color: #1a1a2e; }
    .header-bar {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid #e8eaf0;
    }
    .hero-accent { background: linear-gradient(135deg, #00b4d8, #0077b6, #023e8a); }
    .card {
      background: #fff;
      border: 1px solid #e8eaf0;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: all .18s;
    }
    .card:hover {
      box-shadow: 0 6px 24px rgba(0,119,182,0.1);
      border-color: #90e0ef;
      transform: translateY(-1px);
    }
    .rank-badge {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px; font-size: 14px; font-weight: 800;
    }
    .rank-1 { background: linear-gradient(135deg,#f59e0b,#fbbf24); color:#fff; }
    .rank-2 { background: linear-gradient(135deg,#94a3b8,#cbd5e1); color:#fff; }
    .rank-3 { background: linear-gradient(135deg,#d97706,#f59e0b); color:#fff; }
    .rank-n { background: #f1f5f9; color: #94a3b8; }
    .store-badge-appstore   { background: #0077b6; color:#fff; }
    .store-badge-googleplay { background: #01875f; color:#fff; }
    .shimmer {
      background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
      background-size:200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body class="min-h-screen font-sans">

  <!-- Header -->
  <header class="header-bar sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-xl hero-accent shadow-sm">📱</div>
        <span class="text-lg font-extrabold tracking-tight text-gray-900">앱과사전</span>
      </a>
      <a href="/" class="text-sm text-blue-500 hover:text-blue-700 font-medium">← 순위로 돌아가기</a>
    </div>
  </header>

  <!-- Hero -->
  <div class="hero-accent">
    <div class="max-w-3xl mx-auto px-4 py-10 text-center">
      <p class="text-blue-200 text-xs font-semibold uppercase tracking-widest mb-2" id="week-range"></p>
      <h1 class="text-3xl sm:text-4xl font-extrabold text-white mb-2">이번 주 인기앱</h1>
      <p class="text-blue-100 text-sm">앱과사전 사용자들이 가장 많이 추천한 앱 TOP 10</p>
    </div>
  </div>

  <main class="max-w-3xl mx-auto px-4 py-8">

    <!-- 스켈레톤 -->
    <div id="skeleton" class="space-y-3">
      ${Array.from({length:5}).map(() => `
        <div class="card px-4 py-3 flex items-center gap-4">
          <div class="shimmer w-9 h-9 rounded-xl shrink-0"></div>
          <div class="shimmer w-12 h-12 rounded-2xl shrink-0"></div>
          <div class="flex-1 space-y-2">
            <div class="shimmer h-3 w-40"></div>
            <div class="shimmer h-2.5 w-24"></div>
          </div>
        </div>`).join('')}
    </div>

    <!-- 리스트 -->
    <div id="app-list" class="space-y-3 hidden"></div>

    <!-- 빈 상태 -->
    <div id="empty" class="hidden text-center py-20 text-gray-400">
      <p class="text-4xl mb-4">👍</p>
      <p class="font-semibold text-gray-600 mb-1">아직 투표 데이터가 없어요</p>
      <p class="text-sm">메인 페이지에서 앱을 추천하면 여기에 순위가 쌓여요!</p>
      <a href="/" class="inline-block mt-4 text-sm text-blue-500 hover:text-blue-700">← 앱 추천하러 가기</a>
    </div>

    <p class="text-center text-xs text-gray-400 mt-10">매주 월요일 자동 초기화 · 앱과사전</p>
  </main>

  <script>
    // 이번 주 날짜 범위 표시
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - now.getDay() + 1);
    const sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    const fmt = d => `${d.getMonth()+1}월 ${d.getDate()}일`;
    document.getElementById('week-range').textContent =
      `${now.getFullYear()}년 ${fmt(mon)} ~ ${fmt(sun)}`;

    function escHtml(s) {
      return String(s||'').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function load() {
      try {
        const res  = await fetch('/api/weekly');
        const apps = await res.json();
        document.getElementById('skeleton').classList.add('hidden');
        if (!apps.length) {
          document.getElementById('empty').classList.remove('hidden');
          return;
        }
        const list = document.getElementById('app-list');
        list.classList.remove('hidden');
        list.innerHTML = apps.map((app, i) => {
          const rank = i + 1;
          const rankClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-n';
          const badge = app.store === 'appstore'
            ? `<span class="store-badge-appstore text-[10px] px-1.5 py-0.5 rounded-md font-semibold">App Store</span>`
            : `<span class="store-badge-googleplay text-[10px] px-1.5 py-0.5 rounded-md font-semibold">Google Play</span>`;
          return `
            <a href="/app/${escHtml(app.app_id)}" class="card px-4 py-3 flex items-center gap-4 block">
              <div class="rank-badge ${rankClass} shrink-0">${rank}</div>
              <img src="${escHtml(app.icon)}" alt="${escHtml(app.name)}"
                class="w-12 h-12 rounded-2xl shrink-0 object-cover bg-gray-100"
                onerror="this.src='https://placehold.co/48x48/e2e8f0/94a3b8?text=App'"/>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="font-semibold text-sm text-gray-900 truncate">${escHtml(app.name)}</span>
                  ${badge}
                </div>
                <div class="text-xs text-gray-400 truncate mt-0.5">${escHtml(app.developer)} · ${escHtml(app.category)}</div>
              </div>
              <div class="text-center shrink-0">
                <div class="text-sm font-bold text-blue-500">👍 ${app.votes}</div>
                <div class="text-[10px] text-gray-400">추천</div>
              </div>
            </a>`;
        }).join('');
      } catch(e) {
        document.getElementById('skeleton').classList.add('hidden');
        document.getElementById('empty').classList.remove('hidden');
      }
    }

    load();
  </script>
</body>
</html>
